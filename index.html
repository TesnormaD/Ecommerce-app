<!DOCTYPE html>
<html lang="en" ng-app="shopApp">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AngularJS E-Commerce</title>
    <script src="node_modules/angular/angular.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f5f5f5;
        }

        
        .login-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .login-box {
            width: 350px;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .3);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #007bff;
            color: white;
            font-size: 17px;
            border-radius: 5px;
            cursor: pointer;
        }

        .login-box button:hover {
            background: #0056b3;
        }

        .error {
            color: red;
            margin-top: 10px;
            text-align: center;
        }

        /* Navbar */

        nav {
            background: #131921;
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav h2 {
            color: #ff9900;
        }

        nav input {
            width: 300px;
            padding: 10px;
            border: none;
            border-radius: 4px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logout-btn {
            background: #ff9900;
            color: white;
            border: none;
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 5px;
        }

        /* Hero */

        .hero {
            height: 300px;
            background: url("https://images.unsplash.com/photo-1556740749-887f6717d7e4?w=1400") center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 40px;
            font-weight: bold;
            text-shadow: 2px 2px 5px black;
        }

        .container {
            display: flex;
        }

        /* Products */

        .products {
            width: 75%;
            padding: 20px;
        }

        .filter {
            margin-bottom: 20px;
        }

        .filter select {
            padding: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .15);
            transition: .3s;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .card-body {
            padding: 15px;
        }

        .card-body h3 {
            margin-bottom: 10px;
        }

        .price {
            color: #28a745;
            font-size: 22px;
            margin: 10px 0;
        }

        .card button {
            width: 100%;
            padding: 10px;
            border: none;
            background: #ff9900;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        /* Cart */

        .cart {
            width: 25%;
            background: white;
            padding: 20px;
            border-left: 1px solid #ddd;
            min-height: 100vh;
        }

        .cart-item {
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }

        .cart-item button {
            margin-top: 5px;
            padding: 5px 10px;
            border: none;
            background: red;
            color: white;
            cursor: pointer;
        }

        .checkout {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            background: green;
            color: white;
            cursor: pointer;
            font-size: 18px;
        }

        @media(max-width:900px) {

            .container {
                flex-direction: column;
            }

            .products {
                width: 100%;
            }

            .cart {
                width: 100%;
            }

            nav {
                flex-direction: column;
                gap: 15px;
            }

            nav input {
                width: 100%;
            }

        }
    </style>
</head>

<body ng-controller="shopController">
    <div class="login-container" ng-show="!loggedIn">

        <div class="login-box">

            <h2>Login</h2>

            <input type="text" placeholder="Username" ng-model="username">

            <input type="password" placeholder="Password" ng-model="password">

            <button ng-click="login()">
                Login
            </button>

            <p class="error">{{error}}</p>
        </div>

    </div>



    <nav>

        <h2>ShopZone</h2>

        <input type="text" placeholder="Search products..." ng-model="search">

        <div class="nav-right">

            <h3>
                🛒 {{cart.length}}
            </h3>

            <button class="logout-btn" ng-click="logout()">
                Logout
            </button>

        </div>

    </nav>

    <div class="hero">

        Welcome to ShopZone

    </div>

    <div class="container">

        <div class="products">

            <div class="filter">

                <select ng-model="category">

                    <option value="">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Fashion">Fashion</option>
                    <option value="Accessories">Accessories</option>

                </select>

            </div>

            <div class="grid">
                <!-- PRODUCT CARD -->

                <div class="card" ng-repeat="p in products | filter:search | filter:categoryFilter">

                    <img ng-src="{{p.image}}" alt="{{p.name}}">

                    <div class="card-body">

                        <h3>{{p.name}}</h3>

                        <p>{{p.category}}</p>

                        <div class="price">
                            ₹{{p.price}}
                        </div>

                        <button ng-click="addToCart(p)">
                            Add to Cart
                        </button>

                    </div>

                </div>

            </div>
        </div>

        <!-- CART -->

        <div class="cart">

            <h2>Shopping Cart</h2>

            <br>

            <div class="cart-item" ng-repeat="item in cart">

                <h4>{{item.name}}</h4>

                <p>₹{{item.price}}</p>

                <button ng-click="remove(item)">
                    Remove
                </button>

            </div>

            <hr><br>

            <h3>Total : ₹{{total()}}</h3>

            <button class="checkout" ng-click="checkout()">
                Checkout
            </button>

        </div>

    </div>


    <script>

        var app = angular.module("shopApp", []);

        app.controller("shopController", function ($scope) {

            $scope.loggedIn = false;

            $scope.username = "";
            $scope.password = "";
            $scope.error = "";

            $scope.cart = [];

            $scope.category = "";

            $scope.products = [

                {
                    name: "Gaming Laptop",
                    category: "Electronics",
                    price: 75000,
                    image: "https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=500"
                },

                {
                    name: "Smartphone",
                    category: "Electronics",
                    price: 25000,
                    image: "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500"
                },

                {
                    name: "Headphones",
                    category: "Accessories",
                    price: 3500,
                    image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500"
                },

                {
                    name: "Smart Watch",
                    category: "Accessories",
                    price: 5500,
                    image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500"
                },

                {
                    name: "Running Shoes",
                    category: "Fashion",
                    price: 4500,
                    image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500"
                },

                {
                    name: "Backpack",
                    category: "Accessories",
                    price: 1800,
                    image: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=500"
                },

                {
                    name: "DSLR Camera",
                    category: "Electronics",
                    price: 65000,
                    image: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=500"
                },

                {
                    name: "T-Shirt",
                    category: "Fashion",
                    price: 999,
                    image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500"
                },

                {
                    name: "Sunglasses",
                    category: "Accessories",
                    price: 1200,
                    image: "https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=500"
                },

                {
                    name: "Bluetooth Speaker",
                    category: "Electronics",
                    price: 2800,
                    image: "https://images.unsplash.com/photo-1589003077984-894e133dabab?w=500"
                },

                {
                    name: "Wireless Mouse",
                    category: "Electronics",
                    price: 900,
                    image: "https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?w=500"
                },

                {
                    name: "Jacket",
                    category: "Fashion",
                    price: 3200,
                    image: "https://images.unsplash.com/photo-1523398002811-999ca8dec234?w=500"
                }
            ];

            $scope.login = function () {

                if ($scope.username === "admin" && $scope.password === "1234") {
                    $scope.loggedIn = true;
                    $scope.error = "";
                } else {
                    $scope.error = "Invalid Username or Password";
                }

            };

            $scope.logout = function () {

                $scope.loggedIn = false;
                $scope.username = "";
                $scope.password = "";
                $scope.cart = [];

            };

            $scope.addToCart = function (product) {

                $scope.cart.push(product);

            };

            $scope.remove = function (item) {

                var index = $scope.cart.indexOf(item);

                if (index > -1) {
                    $scope.cart.splice(index, 1);
                }

            };

            $scope.total = function () {

                var sum = 0;

                angular.forEach($scope.cart, function (item) {
                    sum += item.price;
                });

                return sum;

            };

            $scope.checkout = function () {

                if ($scope.cart.length === 0) {
                    alert("Your cart is empty!");
                    return;
                }

                alert(
                    "Order placed successfully!\n\nTotal Amount: ₹" +
                    $scope.total()
                );

                $scope.cart = [];

            };

            $scope.categoryFilter = function (product) {

                if ($scope.category === "" || !$scope.category)
                    return true;

                return product.category === $scope.category;

            };

        });
    </script>

</body>

</html>
